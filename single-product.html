<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart</title>
    <link rel="stylesheet" href="cart/cart.css">
</head>
<body>
    <header>
        <div class="logo">My Shop</div>
        <div class="cart">
            <a href="index.html"><button>Back to Shop</button></a>
        </div>
    </header>

    <main>
        <h2>Your Cart</h2>
        <ul id="cart-items"></ul>
        <p id="total-price">Total: $0.00</p>
        
        <!-- Form to collect user's details -->
        <div id="user-details">
            <h3>Enter Your Details</h3>
            <label for="name">Name: </label>
            <input type="text" id="name" placeholder="Your Name" required>
            <br>
            <label for="email">Email: </label>
            <input type="email" id="email" placeholder="Your Email" required>
            <br>
            <label for="address">Shipping Address: </label>
            <input type="text" id="address" placeholder="Your Address" required>
            <br>
        </div>
        
        <button id="share-order-btn">Share Order to WhatsApp</button>
    </main>

    <script src="cart/cart.js"></script>
</body>
</html>
